name: Release (Cosign Keyless)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write    # 创建 Release 与上传资源
  id-token: write    # Cosign Keyless OIDC 必需
  packages: write

jobs:
  build-and-sign:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      apk: ${{ steps.meta.outputs.apk }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'

      # 可选：若提供了 ALIVE_KEYSTORE_BASE64 等 secret，则注入正式签名 keystore
      - name: Detect keystore secret
        id: keystore_detect
        env:
          ALIVE_KEYSTORE_BASE64: ${{ secrets.ALIVE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ALIVE_KEYSTORE_BASE64" ]; then
            echo "has_keystore=true" >> $GITHUB_OUTPUT
            echo "$ALIVE_KEYSTORE_BASE64" | base64 -d > $HOME/alive-release.jks
            echo "ALIVE_KEYSTORE_FILE=$HOME/alive-release.jks" >> $GITHUB_ENV
          else
            echo "has_keystore=false" >> $GITHUB_OUTPUT
          fi

      - name: Inject signing config (if keystore provided)
        if: steps.keystore_detect.outputs.has_keystore == 'true'
        env:
          ALIVE_KEYSTORE_PASS: ${{ secrets.ALIVE_KEYSTORE_PASS }}
          ALIVE_KEY_ALIAS: ${{ secrets.ALIVE_KEY_ALIAS }}
          ALIVE_KEY_PASS: ${{ secrets.ALIVE_KEY_PASS }}
        run: |
          cat >> ~/.gradle/gradle.properties <<EOF
          alive.signing.keystore=$ALIVE_KEYSTORE_FILE
          alive.signing.keystorePass=$ALIVE_KEYSTORE_PASS
          alive.signing.keyAlias=$ALIVE_KEY_ALIAS
          alive.signing.keyPass=$ALIVE_KEY_PASS
          EOF

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Prepare artifacts
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          APK_PATH=$(find app/build/outputs/apk/release -name '*.apk' | head -n1)
          APK_NAME="Alive-${TAG}.apk"
          cp "$APK_PATH" "$APK_NAME"
          sha256sum "$APK_NAME" | tee "${APK_NAME}.sha256"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "apk=$APK_NAME" >> $GITHUB_OUTPUT

      # ─────────────────────────  Sigstore / Cosign Keyless  ─────────────────────────
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Cosign Keyless sign-blob (OIDC)
        run: |
          set -euo pipefail
          APK="${{ steps.meta.outputs.apk }}"
          # Keyless 模式：cosign 通过 GitHub OIDC 拿到短期证书签名，无需管理私钥
          cosign sign-blob \
            --yes \
            --bundle "${APK}.sigstore.json" \
            --output-signature "${APK}.sig" \
            --output-certificate "${APK}.pem" \
            "$APK"

          echo "### Sigstore 签名产物" > SIGNING.md
          echo "" >> SIGNING.md
          echo '```' >> SIGNING.md
          cosign verify-blob \
            --bundle "${APK}.sigstore.json" \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "$APK" >> SIGNING.md 2>&1 || echo "verify-blob 完成度受限（环境差异），请见下方手动验证步骤" >> SIGNING.md
          echo '```' >> SIGNING.md
          echo "" >> SIGNING.md
          echo "### 本地验证命令" >> SIGNING.md
          echo '```bash' >> SIGNING.md
          echo "cosign verify-blob \\" >> SIGNING.md
          echo "  --bundle ${APK}.sigstore.json \\" >> SIGNING.md
          echo "  --certificate-identity-regexp 'https://github.com/${{ github.repository }}/' \\" >> SIGNING.md
          echo "  --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \\" >> SIGNING.md
          echo "  ${APK}" >> SIGNING.md
          echo '```' >> SIGNING.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Alive ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ steps.meta.outputs.apk }}
            ${{ steps.meta.outputs.apk }}.sha256
            ${{ steps.meta.outputs.apk }}.sig
            ${{ steps.meta.outputs.apk }}.pem
            ${{ steps.meta.outputs.apk }}.sigstore.json
            SIGNING.md
